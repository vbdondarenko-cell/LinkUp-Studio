<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkUp Studio Icon Pack
  Hard Drive - GitHub Dark + Fluent + Minimal Style
-->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="driveBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#30363d"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    
    <linearGradient id="driveFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3f47"/>
      <stop offset="100%" stop-color="#2d333b"/>
    </linearGradient>
    
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Drive body -->
  <rect x="16" y="20" width="96" height="88" rx="8" fill="url(#driveBody)" filter="url(#shadow)"/>
  
  <!-- Drive face plate -->
  <rect x="20" y="24" width="88" height="80" rx="6" fill="url(#driveFace)"/>
  
  <!-- LED indicator slot -->
  <rect x="28" y="32" width="16" height="4" rx="2" fill="#21262d"/>
  
  <!-- LED glow (active) -->
  <circle cx="36" cy="34" r="2" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Drive bay lines -->
  <line x1="52" y1="32" x2="52" y2="92" stroke="#21262d" stroke-width="1"/>
  <line x1="76" y1="32" x2="76" y2="92" stroke="#21262d" stroke-width="1"/>
  
  <!-- Ventilation slots -->
  <g fill="#21262d">
    <rect x="60" y="36" width="24" height="2" rx="1"/>
    <rect x="60" y="42" width="24" height="2" rx="1"/>
    <rect x="60" y="48" width="24" height="2" rx="1"/>
  </g>
  
  <!-- Connector area -->
  <rect x="84" y="36" width="20" height="16" rx="2" fill="#21262d"/>
  <g fill="#30363d">
    <rect x="87" y="40" width="2" height="8" rx="1"/>
    <rect x="91" y="40" width="2" height="8" rx="1"/>
    <rect x="95" y="40" width="2" height="8" rx="1"/>
  </g>
  
  <!-- Label area -->
  <rect x="28" y="60" width="72" height="24" rx="4" fill="#21262d"/>
  <text x="64" y="76" font-family="Inter, -apple-system, sans-serif" font-size="10" font-weight="500" fill="#8b949e" text-anchor="middle">LOCAL DISK</text>
  
  <!-- Top highlight -->
  <rect x="20" y="24" width="88" height="40" rx="6" fill="url(#highlight)"/>
  
  <!-- Subtle border -->
  <rect x="16" y="20" width="96" height="88" rx="8" fill="none" stroke="#484f58" stroke-width="1" stroke-opacity="0.4"/>
</svg>