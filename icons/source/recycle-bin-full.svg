<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkUp Studio Icon Pack
  Recycle Bin Full - GitHub Dark + Fluent + Minimal Style
-->
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="binBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#30363d"/>
      <stop offset="100%" stop-color="#21262d"/>
    </linearGradient>
    
    <linearGradient id="binRim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a3f47"/>
      <stop offset="100%" stop-color="#2d333b"/>
    </linearGradient>
    
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  
  <!-- Bin body -->
  <path d="M32 36 L36 108 C36 112 39 115 43 115 L85 115 C89 115 92 112 92 108 L96 36 L32 36 Z" 
        fill="url(#binBody)" 
        filter="url(#shadow)"/>
  
  <!-- Bin rim -->
  <rect x="26" y="32" width="76" height="10" rx="3" fill="url(#binRim)"/>
  
  <!-- Inner shadow -->
  <path d="M40 42 L43 108 C43 110 45 112 48 112 L80 112 C83 112 85 110 85 108 L88 42 L40 42 Z" 
        fill="#161b22"/>
  
  <!-- Handle -->
  <rect x="50" y="22" width="28" height="14" rx="4" fill="url(#binRim)"/>
  <rect x="54" y="26" width="20" height="6" rx="3" fill="#21262d"/>
  
  <!-- Vertical lines on bin -->
  <g stroke="#21262d" stroke-width="2" stroke-linecap="round">
    <line x1="48" y1="48" x2="52" y2="108"/>
    <line x1="64" y1="48" x2="64" y2="108"/>
    <line x1="80" y1="48" x2="76" y2="108"/>
  </g>
  
  <!-- Trash items inside -->
  <!-- Document 1 -->
  <rect x="46" y="52" width="14" height="18" rx="2" fill="#8b949e" transform="rotate(-8, 53, 61)"/>
  <rect x="49" y="56" width="8" height="2" rx="1" fill="#6e7681"/>
  <rect x="49" y="60" width="6" height="2" rx="1" fill="#6e7681"/>
  
  <!-- Document 2 -->
  <rect x="68" y="50" width="14" height="18" rx="2" fill="#58a6ff" transform="rotate(6, 75, 59)"/>
  <rect x="71" y="54" width="8" height="2" rx="1" fill="#1f6feb"/>
  <rect x="71" y="58" width="6" height="2" rx="1" fill="#1f6feb"/>
  
  <!-- File -->
  <rect x="56" y="62" width="16" height="20" rx="2" fill="#a371f7" transform="rotate(-2, 64, 72)"/>
  <rect x="59" y="66" width="10" height="2" rx="1" fill="#8957e5"/>
  <rect x="59" y="70" width="8" height="2" rx="1" fill="#8957e5"/>
  <rect x="59" y="74" width="6" height="2" rx="1" fill="#8957e5"/>
  
  <!-- Top highlight -->
  <rect x="26" y="32" width="76" height="6" rx="3" fill="url(#highlight)"/>
  
  <!-- Subtle border -->
  <path d="M32 36 L36 108 C36 112 39 115 43 115 L85 115 C89 115 92 112 92 108 L96 36" 
        fill="none" 
        stroke="#484f58" 
        stroke-width="1"
        stroke-opacity="0.4"/>
</svg>