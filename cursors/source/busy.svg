<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkUp Studio Cursor Pack
  Busy/Wait Cursor
  Inspired by: macOS + GitHub Dark + Linear
  
  Style: Classic spinning beachball, minimal
  Hotspot: 16, 16
  Size: 32x32
-->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <linearGradient id="ballGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e6edf3"/>
      <stop offset="100%" stop-color="#8b949e"/>
    </linearGradient>
  </defs>
  
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="14" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Spinning arrows/beachball segments -->
  <g fill="url(#ballGradient)">
    <!-- Segment 1 - Top -->
    <path d="M16 2 A14 14 0 0 1 28 12 L20 14 A6 6 0 0 0 16 8 Z" opacity="0.9"/>
    
    <!-- Segment 2 - Right -->
    <path d="M28 12 A14 14 0 0 1 24 26 L18 20 A6 6 0 0 0 20 14 Z" opacity="0.7"/>
    
    <!-- Segment 3 - Bottom -->
    <path d="M24 26 A14 14 0 0 1 8 26 L12 20 A6 6 0 0 0 18 20 Z" opacity="0.5"/>
    
    <!-- Segment 4 - Left -->
    <path d="M8 26 A14 14 0 0 1 4 12 L10 14 A6 6 0 0 0 12 20 Z" opacity="0.3"/>
  </g>
  
  <!-- Inner shadow -->
  <circle cx="16" cy="16" r="8" fill="#0d1117"/>
  
  <!-- Center highlight -->
  <circle cx="16" cy="16" r="4" fill="#21262d"/>
</svg>