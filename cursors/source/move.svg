<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkUp Studio Cursor Pack
  Move Cursor
  Inspired by: Windows + GitHub Dark + Linear
  
  Style: Four-way move indicator
  Hotspot: 16, 16
  Size: 32x32
-->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Up arrow -->
  <path d="M16 5 L19 10 L17 10 L17 15 L15 15 L15 10 L13 10 Z" fill="#e6edf3"/>
  
  <!-- Down arrow -->
  <path d="M16 27 L13 22 L15 22 L15 17 L17 17 L17 22 L19 22 Z" fill="#e6edf3"/>
  
  <!-- Left arrow -->
  <path d="M5 16 L10 13 L10 15 L15 15 L15 17 L10 17 L10 19 Z" fill="#e6edf3"/>
  
  <!-- Right arrow -->
  <path d="M27 16 L22 19 L22 17 L17 17 L17 15 L22 15 L22 13 Z" fill="#e6edf3"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#58a6ff"/>
</svg>