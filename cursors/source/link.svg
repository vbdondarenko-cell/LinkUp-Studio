<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkUp Studio Cursor Pack
  Link Cursor (with chain)
  Inspired by: GitHub + GitHub Dark
  
  Style: Arrow with link indicator
  Hotspot: 4, 2
  Size: 32x32
-->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Link icon background -->
  <circle cx="24" cy="8" r="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  
  <!-- Chain link icon -->
  <path d="M21 8 L23 6 C24.5 4.5 27 4.5 28.5 6 C30 7.5 30 10 28.5 11.5 L26.5 13.5" 
        stroke="#58a6ff" 
        stroke-width="1.5" 
        fill="none"
        stroke-linecap="round"/>
  
  <path d="M27 10 L25 12 C23.5 13.5 21 13.5 19.5 12 C18 10.5 18 8 19.5 6.5 L21.5 4.5" 
        stroke="#58a6ff" 
        stroke-width="1.5" 
        fill="none"
        stroke-linecap="round"/>
  
  <!-- Main arrow pointer -->
  <path d="M4 4 L4 22 L8 18.5 L11 25 L13 24 L10 17.5 L15 17.5 Z" 
        fill="#e6edf3" 
        stroke="#0d1117" 
        stroke-width="1.5"
        stroke-linejoin="round"
        filter="url(#shadow)"/>
</svg>