<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkUp Studio Cursor Pack
  Loading Cursor
  Inspired by: Linear + GitHub Dark
  
  Style: Modern circular loader with progress indicator
  Hotspot: 16, 16
  Size: 32x32
-->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    
    <!-- Circular gradient for loader -->
    <linearGradient id="loaderGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="#161b22" stroke="#30363d" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Progress arc - 75% filled -->
  <circle cx="16" cy="16" r="10" 
          fill="none" 
          stroke="#21262d" 
          stroke-width="3"/>
  
  <circle cx="16" cy="16" r="10" 
          fill="none" 
          stroke="url(#loaderGradient)" 
          stroke-width="3"
          stroke-linecap="round"
          stroke-dasharray="47 16"
          transform="rotate(-90 16 16)"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3" fill="#58a6ff"/>
  
  <!-- Pulse animation -->
  <circle cx="16" cy="16" r="3" fill="#ffffff" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="1s" repeatCount="indefinite"/>
  </circle>
</svg>