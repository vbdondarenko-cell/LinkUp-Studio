<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkUp Studio Cursor Pack
  Precision Cursor (Crosshair)
  Inspired by: Design tools + GitHub Dark + Linear
  
  Style: Fine crosshair for precision work
  Hotspot: 16, 16
  Size: 32x32
-->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#e6edf3" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Inner ring -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#8b949e" stroke-width="0.5"/>
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#58a6ff"/>
  
  <!-- Crosshair lines -->
  <g stroke="#e6edf3" stroke-width="1.5" stroke-linecap="round">
    <!-- Top -->
    <line x1="16" y1="2" x2="16" y2="6"/>
    <!-- Bottom -->
    <line x1="16" y1="26" x2="16" y2="30"/>
    <!-- Left -->
    <line x1="2" y1="16" x2="6" y2="16"/>
    <!-- Right -->
    <line x1="26" y1="16" x2="30" y2="16"/>
  </g>
  
  <!-- Accent markers -->
  <circle cx="16" cy="4" r="1" fill="#58a6ff"/>
  <circle cx="16" cy="28" r="1" fill="#58a6ff"/>
  <circle cx="4" cy="16" r="1" fill="#58a6ff"/>
  <circle cx="28" cy="16" r="1" fill="#58a6ff"/>
</svg>