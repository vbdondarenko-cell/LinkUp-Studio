<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkUp Studio Cursor Pack
  Hand Cursor (Grab/Open Hand)
  Inspired by: macOS + GitHub Dark + Linear
  
  Style: Clean, modern open hand
  Hotspot: 12, 4
  Size: 32x32
-->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Palm/wrist -->
  <path d="M8 28 L8 20 C8 18 9 17 11 17 L21 17 C23 17 24 18 24 20 L24 28 L8 28 Z" 
        fill="#e6edf3"
        stroke="#0d1117"
        stroke-width="1.5"
        filter="url(#shadow)"/>
  
  <!-- Thumb -->
  <path d="M8 20 L8 14 C8 12 9 11 11 11 L13 11 C14 11 14 12 14 13 L14 17 L8 17 Z" 
        fill="#e6edf3"
        stroke="#0d1117"
        stroke-width="1.5"/>
  
  <!-- Index finger -->
  <rect x="14" y="5" width="4" height="13" rx="2" fill="#e6edf3" stroke="#0d1117" stroke-width="1.5"/>
  
  <!-- Middle finger -->
  <rect x="19" y="4" width="4" height="14" rx="2" fill="#e6edf3" stroke="#0d1117" stroke-width="1.5"/>
  
  <!-- Ring finger -->
  <rect x="24" y="6" width="4" height="12" rx="2" fill="#e6edf3" stroke="#0d1117" stroke-width="1.5"/>
  
  <!-- Highlight details -->
  <rect x="15" y="6" width="2" height="4" rx="1" fill="#ffffff" opacity="0.3"/>
  <rect x="20" y="5" width="2" height="4" rx="1" fill="#ffffff" opacity="0.3"/>
</svg>