<?xml version="1.0" encoding="UTF-8"?>
<!--
  LinkUp Studio Cursor Pack
  Normal Arrow Cursor
  Inspired by: Apple + GitHub Dark + Linear
  
  Style: Clean, minimal, sharp pointer with subtle shadow
  Hotspot: 4, 2
  Size: 32x32
-->
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="1" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    
    <!-- Glow for contrast -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main arrow pointer - filled style -->
  <path d="M6 3 L6 26 L10.5 21 L14 28 L16.5 26.5 L13 19.5 L19 19.5 Z" 
        fill="#e6edf3" 
        stroke="#0d1117" 
        stroke-width="1.5"
        stroke-linejoin="round"
        filter="url(#shadow)"/>
  
  <!-- Inner highlight -->
  <path d="M8 6 L8 22 L11 19 L13 24 L14 23.5 L12 18 L16 18 Z" 
        fill="#ffffff"
        opacity="0.15"/>
</svg>