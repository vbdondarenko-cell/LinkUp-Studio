<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#0d1117"/>
  
  <!-- Grid Pattern -->
  <rect width="256" height="256" rx="48" fill="url(#grid)"/>
  
  <!-- Glow Effect -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="100" fill="url(#glow)"/>
  
  <!-- Logo Blocks 2x2 -->
  <g transform="translate(58, 58)">
    <rect x="0" y="0" width="60" height="60" rx="10" fill="#58a6ff"/>
    <rect x="80" y="0" width="60" height="60" rx="10" fill="#58a6ff" opacity="0.7"/>
    <rect x="0" y="80" width="60" height="60" rx="10" fill="#58a6ff" opacity="0.7"/>
    <rect x="80" y="80" width="60" height="60" rx="10" fill="#58a6ff" opacity="0.5"/>
  </g>
</svg>