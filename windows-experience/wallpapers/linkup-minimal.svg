<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0c10"/>
    </linearGradient>
    
    <radialGradient id="spotlight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  
  <!-- Spotlight Effect -->
  <ellipse cx="960" cy="400" rx="800" ry="500" fill="url(#spotlight)"/>
  
  <!-- Minimal Logo -->
  <g transform="translate(900, 380)" opacity="0.95">
    <rect x="0" y="0" width="50" height="50" rx="8" fill="#58a6ff"/>
    <rect x="70" y="0" width="50" height="50" rx="8" fill="#58a6ff" opacity="0.6"/>
    <rect x="0" y="70" width="50" height="50" rx="8" fill="#58a6ff" opacity="0.6"/>
    <rect x="70" y="70" width="50" height="50" rx="8" fill="#58a6ff" opacity="0.3"/>
  </g>
  
  <!-- Clean Title -->
  <text x="960" y="620" text-anchor="middle" font-family="Segoe UI, Inter, sans-serif" font-size="42" font-weight="300" fill="#e6edf3" letter-spacing="12">
    LINKUP STUDIO
  </text>
  
  <!-- Thin Line -->
  <line x1="760" y1="650" x2="1160" y2="650" stroke="#58a6ff" stroke-width="1" opacity="0.5"/>
  
  <!-- Tagline -->
  <text x="960" y="700" text-anchor="middle" font-family="Segoe UI, Inter, sans-serif" font-size="14" fill="#6e7681" letter-spacing="4">
    DEVELOPER WORKSPACE
  </text>
</svg>