<?xml version="1.0" encoding="UTF-8"?>
<svg width="3840" height="2160" viewBox="0 0 3840 2160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    
    <!-- Accent gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#a371f7"/>
    </linearGradient>
    
    <!-- Subtle pattern -->
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <circle cx="20" cy="20" r="1" fill="#30363d" opacity="0.3"/>
    </pattern>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle glow -->
    <filter id="subtleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base background -->
  <rect width="3840" height="2160" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern overlay -->
  <rect width="3840" height="2160" fill="url(#gridPattern)"/>
  
  <!-- Decorative elements -->
  
  <!-- Large decorative circle - top right -->
  <circle cx="3400" cy="400" r="300" fill="none" stroke="#30363d" stroke-width="1" opacity="0.5"/>
  <circle cx="3400" cy="400" r="250" fill="none" stroke="#30363d" stroke-width="1" opacity="0.3"/>
  <circle cx="3400" cy="400" r="200" fill="none" stroke="#1f6feb" stroke-width="2" opacity="0.2"/>
  
  <!-- Large decorative circle - bottom left -->
  <circle cx="400" cy="1700" r="350" fill="none" stroke="#30363d" stroke-width="1" opacity="0.4"/>
  <circle cx="400" cy="1700" r="280" fill="none" stroke="#30363d" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="1700" r="210" fill="none" stroke="#a371f7" stroke-width="2" opacity="0.15"/>
  
  <!-- Center logo area glow -->
  <ellipse cx="1920" cy="1080" rx="400" ry="300" fill="#1f6feb" opacity="0.05" filter="url(#glow)"/>
  
  <!-- Logo mark -->
  <g transform="translate(1720, 880)" filter="url(#subtleGlow)">
    <!-- Four squares - GitHub-inspired -->
    <rect x="0" y="0" width="100" height="100" rx="12" fill="#1f6feb" opacity="0.9"/>
    <rect x="120" y="0" width="100" height="100" rx="12" fill="#1f6feb" opacity="0.7"/>
    <rect x="0" y="120" width="100" height="100" rx="12" fill="#1f6feb" opacity="0.7"/>
    <rect x="120" y="120" width="100" height="100" rx="12" fill="#1f6feb" opacity="0.5"/>
  </g>
  
  <!-- Text: LinkUp Studio -->
  <text x="1920" y="1150" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="48" font-weight="600" fill="#e6edf3" text-anchor="middle" letter-spacing="4">LINKUP STUDIO</text>
  
  <!-- Subtitle -->
  <text x="1920" y="1200" font-family="Inter, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="18" font-weight="400" fill="#8b949e" text-anchor="middle" letter-spacing="8">GITHUB DARK THEME</text>
  
  <!-- Accent line -->
  <rect x="1760" y="1220" width="320" height="2" rx="1" fill="url(#accentGradient)"/>
  
  <!-- Floating geometric elements -->
  <!-- Top left -->
  <rect x="200" y="300" width="60" height="60" rx="8" fill="none" stroke="#30363d" stroke-width="1" transform="rotate(15, 230, 330)"/>
  <rect x="350" y="250" width="40" height="40" rx="6" fill="#21262d" opacity="0.6"/>
  
  <!-- Top right -->
  <circle cx="3200" cy="250" r="30" fill="#21262d" opacity="0.5"/>
  <rect x="3350" y="180" width="50" height="50" rx="8" fill="none" stroke="#30363d" stroke-width="1"/>
  
  <!-- Bottom right -->
  <rect x="3000" y="1800" width="70" height="70" rx="10" fill="none" stroke="#30363d" stroke-width="1" transform="rotate(-20, 3035, 1835)"/>
  <circle cx="3300" cy="1900" r="25" fill="#21262d" opacity="0.6"/>
  
  <!-- Bottom left -->
  <rect x="250" y="1600" width="55" height="55" rx="8" fill="none" stroke="#30363d" stroke-width="1"/>
  <circle cx="450" cy="1750" r="35" fill="#21262d" opacity="0.4"/>
  
  <!-- Accent dots -->
  <circle cx="600" cy="500" r="4" fill="#58a6ff" opacity="0.6"/>
  <circle cx="3200" cy="1600" r="4" fill="#58a6ff" opacity="0.6"/>
  <circle cx="2800" cy="400" r="3" fill="#a371f7" opacity="0.5"/>
  <circle cx="900" cy="1800" r="3" fill="#a371f7" opacity="0.5"/>
  <circle cx="3400" cy="1200" r="3" fill="#3fb950" opacity="0.4"/>
  <circle cx="400" cy="1000" r="3" fill="#3fb950" opacity="0.4"/>
  
  <!-- Connection lines -->
  <line x1="200" y1="300" x2="350" y2="250" stroke="#30363d" stroke-width="1" opacity="0.3"/>
  <line x1="3000" y1="1800" x2="3350" y2="180" stroke="#30363d" stroke-width="1" opacity="0.3"/>
  
  <!-- Version badge -->
  <g transform="translate(3600, 2050)">
    <rect x="-80" y="-15" width="160" height="30" rx="15" fill="#21262d" opacity="0.8"/>
    <text x="0" y="5" font-family="JetBrains Mono, monospace" font-size="12" fill="#8b949e" text-anchor="middle">v1.0.0</text>
  </g>
  
  <!-- GitHub octocat silhouette hint (subtle) -->
  <g transform="translate(100, 100)" opacity="0.1">
    <path d="M60 0C26.9 0 0 26.9 0 60C0 86.5 17.5 108.8 41.8 117.1C44.8 117.4 45.8 116.1 45.8 115L45.8 97.9C30.9 101.4 27 92.1 27 92.1C24.1 85.3 19.8 83.6 19.8 83.6C14.6 80.4 20.1 80.5 20.1 80.5C25.7 80.9 29 86.5 29 86.5C34.5 94.5 42.2 91.9 45.2 90.6C45.6 86.9 47.1 84.4 48.7 83.1C35.4 81.7 21 76.8 21 54.8C21 48.4 23.3 43.1 26.8 38.9C26.2 37.4 24.2 31.6 27.3 23.7C27.3 23.7 32.1 22.2 45.8 29.6C50.7 28.4 55.9 27.8 60.9 27.8C65.9 27.8 71.1 28.4 76 29.6C89.7 22.2 94.5 23.7 94.5 23.7C97.6 31.6 95.6 37.4 95 38.9C98.5 43.1 100.8 48.4 100.8 54.8C100.8 76.9 86.4 81.6 73.1 83C75.1 84.6 77 87.8 77 92.4L77 115C77 116.1 77.9 117.5 81 117.2C105.3 108.8 122.8 86.5 122.8 60C122.8 26.9 95.9 0 62.8 0H60Z" fill="#e6edf3"/>
  </g>
</svg>